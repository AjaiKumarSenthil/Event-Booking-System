{{- if and .Values.jwt.enabled (not .Values.jwt.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-jwt
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  {{ .Values.jwt.keyFileName }}: |
{{ required "jwt.privateKey is required (or set jwt.existingSecret). Pass it with --set-file jwt.privateKey=./auth-private.pem" .Values.jwt.privateKey | indent 4 }}
{{- end }}
