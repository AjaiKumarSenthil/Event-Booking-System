spring:
  application:
    name: notification
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookmyshow}
    username: ${DB_USERNAME:catalog}
    password: ${DB_PASSWORD:catalog}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.bookmyshow.notification.event,com.bookmyshow.booking.event
        spring.json.value.default.type: com.bookmyshow.notification.event.BookingEvent
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

server:
  port: 8084
  servlet:
    context-path: /notification/v1

  error:
    include-message: always

notification:
  from-email: ${MAIL_USERNAME:noreply@bookmyshow.local}
  from-name: BookMyShow
  topics:
    booking-confirmed: booking.confirmed
    booking-cancelled: booking.cancelled
    dead-letter: booking.notifications.dlt
  retry:
    max-attempts: 3
    initial-interval-ms: 2000
    multiplier: 2.0
