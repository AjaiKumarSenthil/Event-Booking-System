services:

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:

      # ======================== KRaft Mode ========================

      # Unique node ID for this broker
      KAFKA_NODE_ID: 1

      # Single node acts as both broker and controller
      KAFKA_PROCESS_ROLES: broker,controller

      # KRaft controller quorum — only one voter for single node
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # ======================== Listeners ========================

      # CONTROLLER - internal KRaft metadata quorum (port 9093)
      # EXTERNAL   - client connections from host machine (port 9092)
      KAFKA_LISTENERS: CONTROLLER://:9093,EXTERNAL://:9092

      # Address returned to clients after initial connect
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092

      # Security protocol for each listener
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT

      # Controller uses the CONTROLLER listener
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Broker-to-broker communication listener
      KAFKA_INTER_BROKER_LISTENER_NAME: EXTERNAL

      # ======================== Single-Node Overrides ========================
      # Kafka defaults assume a 3-node cluster. These must be 1 for single node.

      # Replication factor for __consumer_offsets (consumer group offset tracking)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # Replication factor for __transaction_state (exactly-once transaction tracking)
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      # Min in-sync replicas for __transaction_state
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
      - kafka-data:/var/lib/kafka/data

volumes:
  kafka-data:
